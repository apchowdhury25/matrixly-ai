# =============================================================================
# Matrixly.ai - CI / CD (Hostinger)
# =============================================================================
# Stack: static HTML5 + Tailwind CDN + vanilla JS (no Vite / Next / Astro)
# Publish: dist/ -> deploy branch (Hostinger Git) + optional FTP
#
# Triggers
#   - pull_request -> lint + build only
#   - push main    -> lint + build + deploy
#   - workflow_dispatch -> full pipeline (manual deploy)
# =============================================================================

name: CI-CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  PYTHON_VERSION: "3.12"

jobs:
  # ---------------------------------------------------------------------------
  # 1) LINT - static site gates + agent syntax compile
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install --no-fund --no-audit

      - name: Lint site
        run: npm run lint

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Compile agent sources
        run: |
          set -euo pipefail
          for agent in email-assistant lead-qualifier crm-assistant shipping-assistant; do
            echo "agents/${agent}"
            python -m pip install --upgrade pip -q
            pip install -r "agents/${agent}/requirements.txt" -q
            python -m compileall -q "agents/${agent}/src"
          done

  # ---------------------------------------------------------------------------
  # 2) BUILD - assemble clean dist/ (public HTML only)
  # ---------------------------------------------------------------------------
  build:
    name: Build
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install --no-fund --no-audit

      - name: Build static site
        run: npm run build

      - name: Verify publish tree
        run: |
          set -euo pipefail
          test -f dist/index.html
          test -f dist/agents.html
          test -f dist/.htaccess
          test ! -d dist/agents
          test ! -f dist/.env
          echo "Publish tree:"
          find dist -type f | sort

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: matrixly-site
          path: dist/
          if-no-files-found: error
          retention-days: 14

  # ---------------------------------------------------------------------------
  # 3) DEPLOY - main / manual only (never PRs)
  #     a) Primary: push dist/ -> deploy branch (Hostinger Git)
  #     b) Optional: FTP when FTP_SERVER secret is set
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy
    needs: build
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    # Map secrets to env so optional FTP can branch without secrets.* in `if:`
    # (GitHub rejects secrets context inside if expressions.)
    env:
      FTP_SERVER: ${{ secrets.FTP_SERVER }}
      FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
      FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: matrixly-site
          path: dist

      - name: Show release contents
        run: |
          echo "Deploying $(find dist -type f | wc -l) files"
          find dist -type f | sort

      - name: Publish to deploy branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: deploy
          clean: true
          single-commit: true
          git-config-name: github-actions[bot]
          git-config-email: 41898282+github-actions[bot]@users.noreply.github.com
          commit-message: "deploy: matrixly.ai ${{ github.sha }}"

      - name: Deploy via FTP (optional)
        if: env.FTP_SERVER != ''
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ env.FTP_SERVER }}
          username: ${{ env.FTP_USERNAME }}
          password: ${{ env.FTP_PASSWORD }}
          port: 21
          protocol: ftps
          local-dir: ./dist/
          server-dir: ./public_html/
          dangerous-clean-slate: false
          log-level: standard
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.env*

      - name: Deployment summary
        run: |
          {
            echo "## Matrixly.ai deploy"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Branch published | \`deploy\` |"
            echo "| Site | https://matrixly.ai |"
            echo "| Trigger | \`${{ github.event_name }}\` |"
            echo ""
            echo "Hostinger: point Git deployment at the **deploy** branch."
          } >> "$GITHUB_STEP_SUMMARY"
