# Lightweight CI skeleton for the static site + agent syntax checks
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  site:
    name: Static site files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure core pages exist
        run: |
          test -f index.html
          test -f agents.html
          test -f products.html
          test -f integrations.html
          test -f README.md
          test -f LICENSE

  agents-python:
    name: Agent Python compile
    runs-on: ubuntu-latest
    strategy:
      matrix:
        agent:
          - email-assistant
          - lead-qualifier
          - crm-assistant
          - shipping-assistant
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: agents/${{ matrix.agent }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile sources
        working-directory: agents/${{ matrix.agent }}
        run: python -m compileall -q src
